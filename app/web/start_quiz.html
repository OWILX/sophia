<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sophia Quiz - In Progress</title>
    <link rel="stylesheet" href="assets/css/quiz.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .quiz-container {
            max-width: 700px;
            margin: 0 auto;
        }

     

        .explanation {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #f0faff;
            border-left: 4px solid var(--primary);
            border-radius: 8px;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
        }

        .primary-btn, .secondary-btn {
            padding: 0.9rem 1.8rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .primary-btn {
            background: linear-gradient(135deg, var(--primary), #20b2aa);
            color: white;
            border: none;
        }

        .secondary-btn {
            background: var(--gray-200);
            color: var(--gray-800);
            border: none;
        }

        .primary-btn:disabled, .secondary-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ── Navigator ── */
        .q-number {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid #ccc;
            background: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .q-number.answered {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
        }

        /* Review navigator states */
        .q-number.review-correct {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
        }

        .q-number.review-wrong {
            background: #ef4444;
            color: white;
            border-color: #ef4444;
        }

        .q-number.review-skipped {
            background: #d1d5db;
            color: #374151;
            border-color: #9ca3af;
        }

        .q-number.current {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.3);
        }

        .tf-option {
            font-size: 1.3rem;
            padding: 1.4rem;
            justify-content: center;
        }

        /* ── Score screen ── */
        .score-screen {
            text-align: center;
            padding: 1rem 0;
        }

        .score-screen h1 {
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .score-number {
            font-size: 3rem;
            font-weight: 800;
            color: var(--gray-800);
            margin: 1rem 0;
        }

        .score-breakdown {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }

        .score-stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
        }

        .score-stat span:first-child {
            font-size: 1.6rem;
            font-weight: 700;
        }

        .score-stat span:last-child {
            font-size: 0.85rem;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-correct  { color: #10b981; }
        .stat-wrong    { color: #ef4444; }
        .stat-skipped  { color: #9ca3af; }

        /* ── Rating buttons ── */
        .rating-row {
            display: flex;
            gap: 0.6rem;
            margin-top: 1.2rem;
            flex-wrap: wrap;
        }

        .rating-btn {
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            opacity: 0.6;
        }

        .rating-btn.selected {
            opacity: 1;
            transform: scale(1.05);
        }

        .rating-btn.again { background: #fef2f2; color: #ef4444; border-color: #fca5a5; }
        .rating-btn.hard  { background: #fffbeb; color: #f59e0b; border-color: #fcd34d; }
        .rating-btn.good  { background: #f0fdf4; color: #10b981; border-color: #6ee7b7; }
        .rating-btn.easy  { background: #eff6ff; color: #3b82f6; border-color: #93c5fd; }

        .rating-btn.again.selected { background: #ef4444; color: white; }
        .rating-btn.hard.selected  { background: #f59e0b; color: white; }
        .rating-btn.good.selected  { background: #10b981; color: white; }
        .rating-btn.easy.selected  { background: #3b82f6; color: white; }

        .rating-label {
            font-size: 0.8rem;
            color: var(--gray-500);
            margin-top: 0.5rem;
        }

        /* ── Misc ── */
        .results-screen h1 { color: var(--primary); }

        .hidden { display: none !important; }

        #loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 1rem;
            color: var(--gray-600);
            font-size: 1.1rem;
        }

        #error-screen {
            display: none;
            padding: 2rem;
            background: #fff5f5;
            border-left: 4px solid #ef4444;
            border-radius: 12px;
            color: #ef4444;
            font-weight: 600;
        }
    </style>
</head>
<body class="quiz-body">

<div class="quiz-container">

    <!-- Loading state -->
    <div id="loading-screen">
        <i class="fas fa-spinner fa-spin fa-2x"></i>
        <span>Loading quiz...</span>
    </div>

    <!-- Error state -->
    <div id="error-screen"></div>

    <!-- Quiz UI (hidden until loaded) -->
    <div id="quiz-ui" class="hidden">
        <div class="quiz-header">
            <div>Question <span id="current">1</span>/<span id="total"></span></div>
            <div id="timer">00:00</div>
        </div>

        <div id="question-card" class="question-card"></div>

        <div class="nav-buttons">
            <button class="secondary-btn" id="prev">Previous</button>
            <button class="secondary-btn" id="next">Next</button>
            <button class="primary-btn hidden" id="submit">Submit Quiz</button>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module">

import { client }          from './assets/js/supabase.js';
import { submitSRSUpdate } from './assets/js/api/srsUpdater.js';

// ─────────────────────────────────────────────
//  Bootstrap
// ─────────────────────────────────────────────
const quizId = localStorage.getItem('current_quiz_id');

if (!quizId) {
    showError('No quiz found. Please start a new quiz.');
} else {
    init();
}

async function init() {
    const { data: { user }, error: authError } = await client.auth.getUser();

    if (authError || !user) {
        showError('You must be logged in to take a quiz.');
        console.warn('User not logged in...');
        return;
    }

    const { data: quiz, error: quizError } = await client
        .from('quizzes')
        .select('question_ids')
        .eq('id', quizId)
        .eq('user_id', user.id)
        .single();

    if (quizError || !quiz) {
        showError('Quiz not found or access denied.');
        return;
    }

    const questionIds = quiz.question_ids;

    if (!Array.isArray(questionIds) || questionIds.length === 0) {
        showError('No questions found in this quiz.');
        return;
    }

    const { data: rows, error: qError } = await client
        .from('questions')
        .select('id, question_type, question_data')
        .in('id', questionIds);

    if (qError || !rows) {
        showError('Failed to load questions.');
        return;
    }

    // Preserve the original question order from question_ids
    const rowMap    = Object.fromEntries(rows.map(r => [r.id, r]));
    const questions = questionIds
        .map(id => rowMap[id])
        .filter(Boolean)
        .map(normalizeQuestion);

    startQuiz(user.id, questions);
}

// ─────────────────────────────────────────────
//  Normalize raw DB row
// ─────────────────────────────────────────────
function normalizeQuestion(row) {
    const data = row.question_data ?? {};
    const type = (row.question_type ?? '').toLowerCase();

    const options = data.options ?? (type === 'tf' ? ['True', 'False'] : []);
    const answer  = (data.answer ?? '').toUpperCase();

    let correct_index;
    if (type === 'tf') {
        correct_index = (answer === 'T' || answer === 'TRUE') ? 0 : 1;
    } else {
        correct_index = Math.max(0, answer.charCodeAt(0) - 'A'.charCodeAt(0));
    }

    return {
        id:          row.id,
        type,
        statement:   data.statement ?? data.question ?? '',
        explanation: data.explanation ?? '',
        options,
        correct_index,
    };
}

// ─────────────────────────────────────────────
//  Quiz logic
// ─────────────────────────────────────────────
let qualities    = {};   // { [questionId]: 'again'|'hard'|'good'|'easy' }
function startQuiz(userId, questions) {
    const KEY = `quiz_${quizId}_`;

    // ── Phases: 'taking' | 'review' ──
    let phase        = 'taking';
    let currentIndex = parseInt(localStorage.getItem(KEY + 'currentIndex')) || 0;
    let answers      = JSON.parse(localStorage.getItem(KEY + 'answers')) || {};
    let time         = parseInt(localStorage.getItem(KEY + 'time')) || 0;
    
    let timerInterval;

    const questionCard = document.getElementById('question-card');
    const currentEl    = document.getElementById('current');
    const totalEl      = document.getElementById('total');
    const prevBtn      = document.getElementById('prev');
    const nextBtn      = document.getElementById('next');
    const submitBtn    = document.getElementById('submit');

    totalEl.textContent = questions.length;

    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('quiz-ui').classList.remove('hidden');

    // ─────────────────────────────────────────
    //  Persistence
    // ─────────────────────────────────────────
    function saveProgress() {
        localStorage.setItem(KEY + 'currentIndex', currentIndex);
        localStorage.setItem(KEY + 'answers',      JSON.stringify(answers));
        localStorage.setItem(KEY + 'time',         time);
    }

    function clearProgress() {
        localStorage.removeItem(KEY + 'currentIndex');
        localStorage.removeItem(KEY + 'answers');
        localStorage.removeItem(KEY + 'time');
    }

    // ─────────────────────────────────────────
    //  Navigator
    // ─────────────────────────────────────────
    function renderNavigator() {
        let html = '<div class="question-navigator" style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:1.5rem; justify-content:center;">';

        questions.forEach((q, i) => {
            let cls = 'q-number';

            if (phase === 'taking') {
                if (answers[q.id] !== undefined) cls += ' answered';
            } else {
                // Review: colour by correctness
                const userAns = answers[q.id];
                if (userAns === undefined)         cls += ' review-skipped';
                else if (userAns === q.correct_index) cls += ' review-correct';
                else                               cls += ' review-wrong';
            }

            if (i === currentIndex) cls += ' current';
            html += `<button class="${cls}" data-index="${i}">${i + 1}</button>`;
        });

        html += '</div>';

        const container = document.querySelector('.quiz-container');
        container.querySelector('.question-navigator')?.remove();
        container.insertAdjacentHTML('afterbegin', html);

        container.querySelectorAll('.q-number').forEach(btn => {
            btn.addEventListener('click', () => {
                currentIndex = parseInt(btn.dataset.index);
                phase === 'taking' ? renderQuestion() : renderReviewQuestion();
                saveProgress();
            });
        });
    }

    // ─────────────────────────────────────────
    //  PHASE 1 — Taking: render question, no feedback
    // ─────────────────────────────────────────
    function renderQuestion() {
        const q    = questions[currentIndex];
        const isTF = q.type === 'tf';

        let html = `<p class="question-text">${escapeHtml(q.statement)}</p>`;
        html += '<div class="options">';

        const displayOptions = isTF ? ['True', 'False'] : q.options;

        displayOptions.forEach((opt, i) => {
            const selected = answers[q.id] === i;
            const cls      = 'option-label' + (isTF ? ' tf-option' : '');
            const label    = isTF ? opt : `${String.fromCharCode(65 + i)}. ${opt}`;

            html += `
                <label class="${cls}">
                    <input type="radio" name="q${q.id}" value="${i}" ${selected ? 'checked' : ''}>
                    <span>${escapeHtml(label)}</span>
                </label>`;
        });

        html += '</div>';

        questionCard.innerHTML = html;
        currentEl.textContent  = currentIndex + 1;

        prevBtn.disabled = currentIndex === 0;
        nextBtn.classList.toggle('hidden',   currentIndex === questions.length - 1);
        submitBtn.classList.toggle('hidden', currentIndex !== questions.length - 1);

        questionCard.querySelectorAll('input[type="radio"]').forEach(radio => {
            radio.addEventListener('change', e => {
                answers[q.id] = parseInt(e.target.value);
                saveProgress();
                renderNavigator();
            });
        });

        renderNavigator();
    }

    // ─────────────────────────────────────────
    //  PHASE 2 — Score screen
    // ─────────────────────────────────────────
    function showScoreScreen() {
        clearInterval(timerInterval);

        let correct = 0, wrong = 0, skipped = 0;

        questions.forEach(q => {
            const userAns = answers[q.id];
            if (userAns === undefined)            skipped++;
            else if (userAns === q.correct_index) correct++;
            else                                  wrong++;
        });

        // Default qualities — user can override in review
        questions.forEach(q => {
            const userAns = answers[q.id];
            qualities[q.id] = (userAns !== undefined && userAns === q.correct_index)
                ? 'good'
                : 'again';
        });

        const total     = questions.length;
        const pct       = Math.round((correct / total) * 100);
        const timeStr   = document.getElementById('timer').textContent;

        questionCard.innerHTML = `
            <div class="score-screen">
                <h1>Quiz Complete!</h1>
                <div class="score-number">${pct}%</div>
                <p style="color:var(--gray-500); margin-bottom:1rem;">
                    Time: <strong>${timeStr}</strong>
                </p>
                <div class="score-breakdown">
                    <div class="score-stat">
                        <span class="stat-correct">${correct}</span>
                        <span>Correct</span>
                    </div>
                    <div class="score-stat">
                        <span class="stat-wrong">${wrong}</span>
                        <span>Wrong</span>
                    </div>
                    <div class="score-stat">
                        <span class="stat-skipped">${skipped}</span>
                        <span>Skipped</span>
                    </div>
                </div>
                <p style="color:var(--gray-500); font-size:0.95rem;">
                    Review your answers and rate each question before saving.
                </p>
            </div>`;

        // Swap nav buttons: just a "Review Answers" button
        prevBtn.classList.add('hidden');
        nextBtn.classList.add('hidden');
        submitBtn.classList.add('hidden');

        const reviewBtn = document.createElement('button');
        reviewBtn.className   = 'primary-btn';
        reviewBtn.textContent = 'Review Answers';
        reviewBtn.style.width = '100%';
        reviewBtn.addEventListener('click', enterReview);
        document.querySelector('.nav-buttons').appendChild(reviewBtn);

        // Remove navigator during score screen
        document.querySelector('.question-navigator')?.remove();
    }

    // ─────────────────────────────────────────
    //  PHASE 3 — Review: per-question with
    //  correct/incorrect feedback + rating buttons
    // ─────────────────────────────────────────
    function enterReview() {
        phase        = 'review';
        currentIndex = 0;

        // Rebuild nav buttons for review mode
        const navDiv = document.querySelector('.nav-buttons');
        navDiv.innerHTML = '';

        const prevR = document.createElement('button');
        prevR.className   = 'secondary-btn';
        prevR.id          = 'review-prev';
        prevR.textContent = 'Previous';

        const nextR = document.createElement('button');
        nextR.className   = 'secondary-btn';
        nextR.id          = 'review-next';
        nextR.textContent = 'Next';

        const finishBtn = document.createElement('button');
        finishBtn.className   = 'primary-btn';
        finishBtn.id          = 'review-finish';
        finishBtn.textContent = 'Finish & Save';

        navDiv.appendChild(prevR);
        navDiv.appendChild(nextR);
        navDiv.appendChild(finishBtn);

        prevR.addEventListener('click', () => {
            if (currentIndex > 0) { currentIndex--; renderReviewQuestion(); }
        });

        nextR.addEventListener('click', () => {
            if (currentIndex < questions.length - 1) { currentIndex++; renderReviewQuestion(); }
        });

        finishBtn.addEventListener('click', finishReview);

        renderReviewQuestion();
    }

    function renderReviewQuestion() {
        const q       = questions[currentIndex];
        const isTF    = q.type === 'tf';
        const userAns = answers[q.id];
        const skipped = userAns === undefined;
        const correct = !skipped && userAns === q.correct_index;

        let html = `<p class="question-text">${escapeHtml(q.statement)}</p>`;
        html += '<div class="options">';

        const displayOptions = isTF ? ['True', 'False'] : q.options;

        displayOptions.forEach((opt, i) => {
            const isSelected = userAns === i;
            const isCorrect  = i === q.correct_index;

            let cls = 'option-label locked' + (isTF ? ' tf-option' : '');

            if (skipped && isCorrect)     cls += ' skipped-correct';
            else if (isCorrect)           cls += ' correct';
            else if (isSelected)          cls += ' incorrect';

            const label = isTF ? opt : `${String.fromCharCode(65 + i)}. ${opt}`;

            html += `
                <label class="${cls}">
                    <input type="radio" name="q${q.id}" value="${i}"
                        ${isSelected ? 'checked' : ''} disabled>
                    <span>${escapeHtml(label)}</span>
                </label>`;
        });

        html += '</div>';

        // Explanation always shown in review
        html += `
            <div class="explanation">
                <strong>Explanation:</strong>
                ${escapeHtml(q.explanation || 'No explanation available')}
            </div>`;

        // Rating buttons
        const currentRating = qualities[q.id] ?? (correct ? 'good' : 'again');
        html += `
            <div class="rating-row" id="rating-row-${q.id}">
                ${['again','hard','good','easy'].map(r => `
                    <button class="rating-btn ${r} ${currentRating === r ? 'selected' : ''}"
                        data-qid="${q.id}" data-rating="${r}">
                        ${r.charAt(0).toUpperCase() + r.slice(1)}
                    </button>`).join('')}
            </div>
            <p class="rating-label">How well did you know this?</p>`;

        questionCard.innerHTML = html;
        currentEl.textContent  = currentIndex + 1;

        // Rating button listeners
        questionCard.querySelectorAll('.rating-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const qid    = parseInt(btn.dataset.qid);
                const rating = btn.dataset.rating;
                qualities[qid] = rating;

                // Update selected state within this row
                questionCard.querySelectorAll('.rating-btn').forEach(b => {
                    b.classList.toggle('selected', b.dataset.rating === rating);
                });
            });
        });

        // Update nav button states
        document.getElementById('review-prev').disabled = currentIndex === 0;
        document.getElementById('review-next').disabled = currentIndex === questions.length - 1;

        renderNavigator();
    }

    // ─────────────────────────────────────────
    //  Finish: submit SRS + cleanup
    // ─────────────────────────────────────────
    async function finishReview() {
        const finishBtn = document.getElementById('review-finish');
        finishBtn.disabled     = true;
        finishBtn.textContent  = 'Saving...';

        const result = await submitSRSUpdate(userId, qualities);

        if (!result.ok) {
            console.warn('SRS update failed:', result.error);
            finishBtn.disabled    = false;
            finishBtn.textContent = 'Finish & Save';
            return;
        }

        clearProgress();
        localStorage.removeItem('current_quiz_id');

        // Redirect or show completion message
        questionCard.innerHTML = `
            <div class="score-screen">
                <h1>All done!</h1>
                <p style="font-size:1.1rem; color:var(--gray-600);">
                    Your progress has been saved.
                </p>
                <a href="dashboard.html" class="primary-btn" style="display:inline-block; margin-top:1.5rem; text-decoration:none;">
                    Back to Dashboard
                </a>
            </div>`;

        document.querySelector('.nav-buttons').innerHTML = '';
        document.querySelector('.question-navigator')?.remove();
        document.getElementById('quiz-header')?.remove();
    }

    // ─────────────────────────────────────────
    //  Timer
    // ─────────────────────────────────────────
    function startTimer() {
        timerInterval = setInterval(() => {
            time++;
            const mins = String(Math.floor(time / 60)).padStart(2, '0');
            const secs = String(time % 60).padStart(2, '0');
            document.getElementById('timer').textContent = `${mins}:${secs}`;
            saveProgress();
        }, 1000);
    }

    // ─────────────────────────────────────────
    //  Taking navigation
    // ─────────────────────────────────────────
    prevBtn.addEventListener('click', () => {
        if (currentIndex > 0) {
            currentIndex--;
            renderQuestion();
            saveProgress();
        }
    });

    nextBtn.addEventListener('click', () => {
        if (currentIndex < questions.length - 1) {
            currentIndex++;
            renderQuestion();
            saveProgress();
        }
    });

    submitBtn.addEventListener('click', () => showScoreScreen());

    // ─────────────────────────────────────────
    //  Start
    // ─────────────────────────────────────────
    renderQuestion();
    startTimer();
}

// ─────────────────────────────────────────────
//  Helpers
// ─────────────────────────────────────────────
function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = String(str ?? '');
    return div.innerHTML;
}

function showError(msg) {
    document.getElementById('loading-screen').style.display = 'none';
    const el = document.getElementById('error-screen');
    el.style.display = 'block';
    el.textContent   = msg;
}

</script>
</body>
</html>
